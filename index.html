<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão Copa 2026</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <h1>⚽ Bolão Copa 2026</h1>
    <a href="admin.html" class="header-link">Admin</a>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="chaveamento">Chaveamento</button>
    <button class="tab-btn" data-tab="palpitar">Palpitar</button>
    <button class="tab-btn" data-tab="classificacao">Classificação</button>
  </nav>

  <!-- Chaveamento -->
  <section id="tab-chaveamento" class="tab-panel active">
    <div id="bracket-container" class="bracket-container">
      <p style="color:#8fa8c0">Carregando chaveamento...</p>
    </div>
  </section>

  <!-- Palpitar -->
  <section id="tab-palpitar" class="tab-panel">
    <div class="palpitar-header">
      <label for="input-nome">Seu nome:</label>
      <input id="input-nome" class="input-nome" type="text" placeholder="Digite seu nome" autocomplete="off">
      <button id="btn-carregar" class="btn btn-secondary">Carregar palpites</button>
    </div>
    <div id="palpitar-form">
      <p style="color:#8fa8c0">Digite seu nome e clique em "Carregar palpites".</p>
    </div>
    <div style="margin-top:1rem">
      <button id="btn-salvar-palpites" class="btn btn-primary" style="display:none">
        Salvar Palpites
      </button>
    </div>
  </section>

  <!-- Classificação -->
  <section id="tab-classificacao" class="tab-panel">
    <table class="classificacao-table">
      <thead>
        <tr>
          <th>#</th>
          <th>Participante</th>
          <th>16 Avos</th>
          <th>Oitavas</th>
          <th>Quartas</th>
          <th>Semi</th>
          <th>Final</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="classificacao-body">
        <tr><td colspan="8" style="color:#8fa8c0;text-align:center">Carregando...</td></tr>
      </tbody>
    </table>
  </section>

  <script type="module" src="js/app.js"></script>
</body>
</html>
